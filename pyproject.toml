[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name            = "fie-sdk"
version         = "1.4.0"
description     = "Adversarial prompt detection + LLM hallucination monitoring — works offline with zero setup, or with a server for full shadow-jury verification and auto-correction"
readme          = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.9"
license         = { text = "Apache-2.0" }

authors = [
    { name = "Ayush", email = "ayushsingh355vns@gmail.com" }
]
keywords = [
    "llm",
    "monitoring",
    "observability",
    "hallucination-detection",
    "ai-safety",
    "prompt-injection",
    "model-degradation",
    "explainable-ai",
    "reliability",
    "ai-guardrails",
    "multi-tenant",
    "oauth",
    "xgboost",
    "question-classification",
    "auto-calibration",
    "ground-truth-verification",
    "failure-intelligence"
]

classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
]

dependencies = [
    "requests>=2.28.0",
]

[project.scripts]
fie = "fie.__main__:main"

[project.optional-dependencies]
ml = [
    "scikit-learn>=1.3",
    "xgboost>=2.0",
    "joblib>=1.3",
    "pandas>=2.0",
    "sentence-transformers>=2.7",
]
dev = [
    "pytest>=7.0",
    "httpx>=0.24.0",
]

[project.urls]
Homepage      = "https://github.com/AyushSingh110/Failure_Intelligence_System"
Repository    = "https://github.com/AyushSingh110/Failure_Intelligence_System"
Issues        = "https://github.com/AyushSingh110/Failure_Intelligence_System/issues"
Documentation = "https://github.com/AyushSingh110/Failure_Intelligence_System#readme"
Changelog     = "https://github.com/AyushSingh110/Failure_Intelligence_System/releases"

[tool.hatch.build.targets.wheel]
packages = ["fie"]
artifacts = [
    "fie/models/failure_classifier_v4.pkl",
    "fie/models/feature_columns_v4.pkl",
    "fie/models/pair_intent_classifier.pkl",
    "fie/models/pair_intent_meta.json",
]
