[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name            = "fie-sdk"
version         = "1.2.0"
description     = "Monitor, diagnose, and auto-correct LLM failures — with XGBoost failure classification, question-type routing, auto-calibrating thresholds, Wikidata/Serper ground truth, and production analytics"
readme          = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.9"
license         = { text = "MIT" }

authors = [
    { name = "Ayush", email = "ayushsingh355vns@gmail.com" }
]
keywords = [
    "llm",
    "monitoring",
    "observability",
    "hallucination-detection",
    "ai-safety",
    "prompt-injection",
    "model-degradation",
    "explainable-ai",
    "reliability",
    "ai-guardrails",
    "multi-tenant",
    "oauth",
    "xgboost",
    "question-classification",
    "auto-calibration",
    "ground-truth-verification",
    "failure-intelligence"
]

classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
]

dependencies = [
    "requests>=2.28.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "httpx>=0.24.0",
]

[project.urls]
Homepage      = "https://github.com/AyushSingh110/Failure_Intelligence_System"
Repository    = "https://github.com/AyushSingh110/Failure_Intelligence_System"
Issues        = "https://github.com/AyushSingh110/Failure_Intelligence_System/issues"
Documentation = "https://github.com/AyushSingh110/Failure_Intelligence_System#readme"
Changelog     = "https://github.com/AyushSingh110/Failure_Intelligence_System/releases"

[tool.hatch.build.targets.wheel]
packages = ["fie"]
